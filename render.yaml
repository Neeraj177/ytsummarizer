# 1. Managed Databases Section
databases:
  - name: ytsummarizer-db
    databaseName: ytsummarizer
    user: neeraj
    plan: free
    ipAllowList: []

# 2. Web Services Section
services:
  # Spring Boot Backend Web Service
  - type: web
    name: ytsummarizer-backend
    runtime: docker            # ◄── FIX: 'dockerK' se vapas 'docker' kar diya
    plan: free
    dockerContext: ./ytsummarizer
    dockerfilePath: Dockerfile
    envVars:
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: ytsummarizer-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: ytsummarizer-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: ytsummarizer-db
          property: password
      - key: GEMINI_API_KEY
        value: "PLACEHOLDER_KEY"

  # Vite-React Frontend Service
  - type: web
    name: ytsummarizer-frontend
    runtime: docker
    plan: free
    dockerContext: ./yt-summarizer-frontend/yt-summarizer
    dockerfilePath: Dockerfile
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: ytsummarizer-backend
          property: url